<script>
    let dialogCallback = null;

    function showCustomDialog(options) {
        const overlay = document.getElementById('custom-dialog');
        const iconBg = document.getElementById('dialog-icon-bg');
        const icon = document.getElementById('dialog-icon');
        const title = document.getElementById('dialog-title');
        const message = document.getElementById('dialog-message');
        const singleActions = document.getElementById('dialog-actions-single');
        const confirmActions = document.getElementById('dialog-actions-confirm');
        const confirmBtn = document.getElementById('dialog-confirm-btn');

        // Reset
        title.innerText = options.title || 'Pemberitahuan';
        message.innerText = options.message || '';
        icon.setAttribute('data-lucide', options.icon || 'check');
        singleActions.classList.add('hidden');
        confirmActions.classList.add('hidden');

        if (options.type === 'confirm') {
            confirmActions.classList.remove('hidden');
            iconBg.className = 'dialog-icon-wrapper bg-red-50 text-red-600';
            confirmBtn.innerText = options.confirmText || 'Hapus';
            confirmBtn.className = `flex-1 py-3 text-white rounded-xl font-semibold transition-colors shadow-md ${options.confirmColor === 'red' ? 'bg-red-600 hover:bg-red-700' : 'bg-indigo-600 hover:bg-indigo-700'}`;

            dialogCallback = options.callback;
            confirmBtn.onclick = () => {
                overlay.classList.remove('show');
                if (dialogCallback) dialogCallback(true);
            };
        } else {
            singleActions.classList.remove('hidden');
            iconBg.className = `dialog-icon-wrapper ${options.iconColor === 'red' ? 'bg-red-50 text-red-600' : 'bg-emerald-50 text-emerald-600'}`;
        }

        overlay.classList.add('show');
        lucide.createIcons();
    }

    function closeCustomDialog(result = false) {
        document.getElementById('custom-dialog').classList.remove('show');
        if (dialogCallback) dialogCallback(result);
        dialogCallback = null;
    }

    function notifySuccess(msg) {
        showCustomDialog({ title: 'Berhasil', message: msg, icon: 'check-circle', iconColor: 'emerald' });
    }

    function notifyError(msg) {
        showCustomDialog({ title: 'Kesalahan', message: msg, icon: 'alert-circle', iconColor: 'red' });
    }

    function askDeletion(msg, callback) {
        showCustomDialog({ type: 'confirm', title: 'Hapus Data', message: msg, icon: 'trash-2', confirmText: 'Hapus', confirmColor: 'red', callback: callback });
    }
    // --- GLOBAL VARIABLES ---
    let DATA_CERT = [], DATA_LAT = [], DATA_REAL = [], DATA_L1 = [], DATA_L2 = [], DATA_L3 = [], DATA_VENDOR = [];
    let CURRENT_YEAR_GROUPS = {}, REALIZATION_GROUPS = {};
    let FILTERED_CERT = [], FILTERED_LAT = [], FILTERED_REAL = [], FILTERED_L1 = [], FILTERED_L2 = [], FILTERED_L3 = [];
    let ACTIVE_YEAR = "", ACTIVE_MONTH = "", ACTIVE_REAL_YEAR = "";
    let REALIZATION_VIEW_MODE = "peserta";
    let ACTIVE_EVALUASI_YEAR = "";
    let REAL_MAP = {};

    function normalizeId(id) {
        if (id === null || id === undefined) return '';
        let sid = String(id).trim();
        if (sid.endsWith('.0')) sid = sid.substring(0, sid.length - 2);
        return sid;
    }

    // --- UTILITIES ---
    function debounce(func, wait) {
        let timeout;
        return function(...args) {
            const context = this;
            clearTimeout(timeout);
            timeout = setTimeout(() => func.apply(context, args), wait);
        };
    }

    const debouncedRenderVendorTable = debounce(() => renderVendorTable(), 300);
    const debouncedRenderEmployeeList = debounce(() => renderEmployeeList(), 300);
    const debouncedRenderRealizationList = debounce(() => renderRealizationList(), 300);
    const debouncedFilterL1Data = debounce((val) => filterL1Data(val), 300);
    const debouncedFilterL2Data = debounce((val) => filterL2Data(val), 300);
    const debouncedFilterL3Data = debounce((val) => filterL3Data(val), 300);

    let IS_REAL_LOADED = false;

    // Calendar Globals
    let calendar;
    let currentViewMode = 'list';
    // Global Loading Reference
    let loadingContainer;

    // Global Error Handler
    window.onerror = function (msg, url, line, col, error) {
        notifyError("Application Error: " + msg + "\nLine: " + line);
        return false;
    };

    window.onload = function () {
        // Init Theme
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
            const icon = document.getElementById('dark-mode-icon');
            if (icon) icon.setAttribute('data-lucide', 'sun');
        }

        loadingContainer = document.getElementById('loading-container');
        loadData();

        // Initialize with Dashboard view
        openSubPage('page-dashboard', 'Dashboard');

        if (typeof lucide !== 'undefined') {
            lucide.createIcons();
        }

        document.addEventListener('click', function (e) {
            const btn = document.querySelector('button[onclick="toggleAddDropdown(event)"]');
            const menu = document.getElementById('add-dropdown-menu');
            if (btn && menu && !btn.contains(e.target) && !menu.contains(e.target)) {
                menu.classList.add('hidden');
            }
        });
    };

    function toggleDarkMode() {
        const isDark = document.documentElement.classList.toggle('dark');
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
        const icon = document.getElementById('dark-mode-icon');
        if (icon) {
            icon.setAttribute('data-lucide', isDark ? 'sun' : 'moon');
            lucide.createIcons();
        }
    }

    function onFailure(error) {
        console.error('❌ Data load failed:', error);
        if (loadingContainer) {
            loadingContainer.classList.add('hidden');
        }
        notifyError('Gagal memuat data: ' + error.message);
    }

    /* --- DATA FETCHING (PARALLEL) --- */
    // Counter: panggil updateDashboardStats hanya setelah semua 6 data selesai
    let _dashLoadCount = 0;
    let _loadingTimeout;

    function _tryUpdateDashboard() {
        _dashLoadCount++;
        console.log(`📊 Data loaded: ${_dashLoadCount}/7`);

        // Update stats incrementally as data arrives
        updateDashboardStats();

        if (_dashLoadCount >= 7) {
            _finishLoading();
        }
    }

    function _finishLoading() {
        if (_loadingTimeout) clearTimeout(_loadingTimeout);
        console.log("✅ FINISHING LOAD: Hiding spinner and updating stats...");

        if (loadingContainer) {
            loadingContainer.classList.add('hidden');
        }

        stopLoadingTextRotation();

        updateDashboardStats();

        if (typeof lucide !== 'undefined') lucide.createIcons();
    }

    function loadData() {
        _dashLoadCount = 0;
        console.log('🔵 START: Loading data in parallel...');

        if (loadingContainer) {
            loadingContainer.classList.remove('hidden');
        }

        startLoadingTextRotation();

        // Fail-safe timeout: Force show dashboard after 30 seconds if some requests hang (large dataset)
        _loadingTimeout = setTimeout(() => {
            if (_dashLoadCount < 7) {
                console.warn("⚠️ LOAD TIMEOUT: Some data requests are taking too long. Forcing dashboard view.");
                _finishLoading();
            }
        }, 30000);

        google.script.run.withSuccessHandler(onCertLoaded).withFailureHandler(onFailure).getData();
        google.script.run.withSuccessHandler(onLatLoaded).withFailureHandler(onFailure).getLATData();
        google.script.run.withSuccessHandler(onRealLoaded).withFailureHandler(onFailure).getRealizationData();
        google.script.run.withSuccessHandler(onL1Loaded).withFailureHandler(onFailure).getEvaluasiL1Data();
        google.script.run.withSuccessHandler(onL2Loaded).withFailureHandler(onFailure).getEvaluasiL2Data();
        google.script.run.withSuccessHandler(onL3Loaded).withFailureHandler(onFailure).getEvaluasiL3Data();
        google.script.run.withSuccessHandler(onVendorLoaded).withFailureHandler(onFailure).getVendorData();
    }

    let loadingTextInterval;
    function startLoadingTextRotation() {
        const subtext = document.getElementById('loading-subtext');
        if (!subtext) return;

        const messages = [
            "Mohon tunggu sebentar...",
            "Mengambil data peserta (Dataset Besar)...",
            "Mengolah ribuan baris data...",
            "Hampir selesai, sedang menyusun dashboard..."
        ];
        let idx = 0;

        if (loadingTextInterval) clearInterval(loadingTextInterval);

        loadingTextInterval = setInterval(() => {
            idx = (idx + 1) % messages.length;
            subtext.style.opacity = 0;
            setTimeout(() => {
                subtext.innerText = messages[idx];
                subtext.style.opacity = 1;
            }, 500);
        }, 4000);
    }

    function stopLoadingTextRotation() {
        if (loadingTextInterval) {
            clearInterval(loadingTextInterval);
            loadingTextInterval = null;
        }
    }

    function onCertLoaded(data) {
        console.log('✅ CERT Loaded:', (data || []).length);
        DATA_CERT = data || [];
        if (!document.getElementById('page-perencanaan').classList.contains('hidden')) {
            renderYearCards();
        }
        _tryUpdateDashboard();
    }
    function onLatLoaded(data) {
        console.log('✅ LAT Loaded:', (data || []).length);
        DATA_LAT = data || [];
        if (!document.getElementById('page-perencanaan').classList.contains('hidden')) {
            renderYearCards();
        }
        _tryUpdateDashboard();
    }
    function onL1Loaded(data) {
        console.log('✅ L1 Loaded:', (data || []).length);
        DATA_L1 = data || [];
        if (IS_REAL_LOADED) enrichL1Data();
        _tryUpdateDashboard();
    }
    function onL2Loaded(data) {
        console.log('✅ L2 Loaded:', (data || []).length);
        DATA_L2 = data || [];
        if (IS_REAL_LOADED) enrichL2Data();
        _tryUpdateDashboard();
    }
    function onL3Loaded(data) {
        console.log('✅ L3 Loaded:', (data || []).length);
        DATA_L3 = data || [];
        if (IS_REAL_LOADED) enrichL3Data();
        _tryUpdateDashboard();
    }
    function onVendorLoaded(data) {
        console.log('✅ VENDOR Loaded:', (data || []).length);
        DATA_VENDOR = data || [];
        _tryUpdateDashboard();
        if (!document.getElementById('page-vendor').classList.contains('hidden')) {
            renderVendorTable();
        }
    }

    function indexRealizationData() {
        REAL_MAP = {};
        (DATA_REAL || []).forEach(r => {
            const nid = normalizeId(r.id);
            if (nid) REAL_MAP[nid] = r;
        });
    }

    function enrichL1Data() {
        if (!DATA_L1 || DATA_L1.length === 0) return;
        if (Object.keys(REAL_MAP).length === 0) indexRealizationData();

        DATA_L1.forEach(l1 => {
            const nid = normalizeId(l1.pelaksanaanId);
            const real = REAL_MAP[nid];

            if (real) {
                l1.tahun = real.tahun;
                l1.itemId = real.itemId;
            } else {
                const pStr = String(l1.pelaksanaanId);
                const yearMatch = pStr.match(/20\d{2}/);
                if (yearMatch) l1.tahun = parseInt(yearMatch[0]);
                else l1.tahun = l1.tahun || "Lainnya";
                l1.itemId = l1.itemId || "-";
            }
        });
    }

    function enrichL2Data() {
        if (!DATA_L2 || DATA_L2.length === 0) return;
        if (Object.keys(REAL_MAP).length === 0) indexRealizationData();

        DATA_L2.forEach(l2 => {
            const nid = normalizeId(l2.pelaksanaanId);
            const real = REAL_MAP[nid];

            if (real) {
                l2.tahun = real.tahun;
                l2.itemId = real.itemId;
            } else {
                const pStr = String(l2.pelaksanaanId);
                const yearMatch = pStr.match(/20\d{2}/);
                if (yearMatch) l2.tahun = parseInt(yearMatch[0]);
                else l2.tahun = l2.tahun || "Lainnya";
                l2.itemId = l2.itemId || "-";
            }
        });
    }

    function enrichL3Data() {
        if (!DATA_L3 || DATA_L3.length === 0) return;
        if (Object.keys(REAL_MAP).length === 0) indexRealizationData();

        DATA_L3.forEach(l3 => {
            const nid = normalizeId(l3.pelaksanaanId);
            const real = REAL_MAP[nid];

            if (real) {
                l3.tahun = real.tahun;
                l3.itemId = real.itemId;
            } else {
                const pStr = String(l3.pelaksanaanId);
                const yearMatch = pStr.match(/20\d{2}/);

                if (yearMatch) {
                    l3.tahun = parseInt(yearMatch[0]);
                } else if (l3.tanggalEval) {
                    const d = new Date(l3.tanggalEval);
                    if (!isNaN(d.getTime())) l3.tahun = d.getFullYear();
                }
                l3.tahun = l3.tahun || "Lainnya";
                l3.itemId = l3.itemId || "-";
            }
        });
    }
    function onRealLoaded(data) {
        console.log('✅ REALIZATION Loaded:', (data || []).length);
        DATA_REAL = data || [];

        indexRealizationData();
        IS_REAL_LOADED = true;

        if (DATA_L1.length > 0) enrichL1Data();
        if (DATA_L2.length > 0) enrichL2Data();
        if (DATA_L3.length > 0) enrichL3Data();

        // If user is currently on Pelaksanaan page, re-render it
        if (!document.getElementById('page-pelaksanaan').classList.contains('hidden')) {
            renderRealizationYears();
        }

        _tryUpdateDashboard();
    }

    function onFailure(error) {
        console.error('❌ DATA LOAD FAILED:', error);
        if (loadingContainer) {
            loadingContainer.classList.add('hidden');
        }
        notifyError('Gagal memuat data: ' + (error.message || error));

        // Tetap coba jalankan dashboard jika ada data yang berhasil
        _tryUpdateDashboard();
    }

    function runHeaderDebug() {
        google.script.run.withSuccessHandler(alert).debugHeaders();
    }

    function debugFrontendData() {
        const log = [];
        log.push("📊 **DIAGNOSA FRONTEND (Browser Memory)**");
        log.push(`DATA_L1: ${Array.isArray(DATA_L1) ? DATA_L1.length : 'undefined'} item`);
        log.push(`DATA_L2: ${Array.isArray(DATA_L2) ? DATA_L2.length : 'undefined'} item`);
        log.push(`DATA_L3: ${Array.isArray(DATA_L3) ? DATA_L3.length : 'undefined'} item`);
        log.push(`DATA_REAL: ${Array.isArray(DATA_REAL) ? DATA_REAL.length : 'undefined'} item`);
        log.push(`ACTIVE_EVALUASI_YEAR: "${ACTIVE_EVALUASI_YEAR}" (Type: ${typeof ACTIVE_EVALUASI_YEAR})`);

        if (DATA_L1 && DATA_L1.length > 0) {
            const s = DATA_L1[0];
            log.push("");
            log.push("**Sample L1[0]:**");
            log.push(`- ID: ${s.id}`);
            log.push(`- PelaksanaanId: "${s.pelaksanaanId}"`);
            log.push(`- Tahun (Enriched): ${s.tahun} (Type: ${typeof s.tahun})`);
            log.push(`- Judul: ${s.judulPelatihan}`);
        }

        alert(log.join('\n'));
    }

    function onVendorLoaded(data) {
        DATA_VENDOR = data || [];
        _tryUpdateDashboard();
        if (!document.getElementById('page-vendor').classList.contains('hidden')) {
            renderVendorTable();
        }
    }

    function renderVendorTable() {
        const tbody = document.getElementById('vendor-table-body');
        if (!tbody) return;

        if (DATA_VENDOR.length === 0) {
            tbody.innerHTML = '<tr><td colspan="8" class="px-8 py-10 text-center text-gray-400 italic">Belum ada data pengajuan vendor</td></tr>';
            return;
        }

        tbody.innerHTML = DATA_VENDOR.map((v, idx) => {
            let statusClass = "bg-gray-100 text-gray-600";
            const s = String(v.status || "").toLowerCase();
            if (s === "disetujui") statusClass = "bg-emerald-50 text-emerald-600";
            else if (s === "ditolak") statusClass = "bg-red-50 text-red-600";
            else if (s === "pending") statusClass = "bg-orange-50 text-orange-600";

            return `
                <tr class="hover:bg-gray-50/50 transition-colors">
                    <td class="px-6 py-5 text-xs font-medium text-gray-400">${idx + 1}</td>
                    <td class="px-6 py-5">
                        <p class="text-xs font-bold text-[#1E1B4B] dark:text-white">${v.namaVendor}</p>
                        <p class="text-[10px] text-gray-400 mt-0.5">${v.namaLsp}</p>
                    </td>
                    <td class="px-6 py-5">
                        <p class="text-xs font-medium text-gray-600 dark:text-gray-300">${v.namaSertifikasi}</p>
                        <p class="text-[10px] text-gray-400 mt-0.5">${v.jenisSertifikasi}</p>
                    </td>
                    <td class="px-6 py-5 text-xs text-gray-500">${v.picVendor}</td>
                    <td class="px-6 py-5 text-xs font-bold text-[#6366F1]">${v.biaya}</td>
                    <td class="px-6 py-5 text-xs text-gray-500">${v.metode}</td>
                    <td class="px-6 py-5">
                        <span class="px-3 py-1 rounded-full text-[10px] font-bold ${statusClass}">${v.status}</span>
                    </td>
                    <td class="px-6 py-5">
                        <div class="flex items-center justify-center gap-2">
                            ${s === 'pending' ? `
                                <button onclick="handleVendorAction(${v.rowIndex}, 'Disetujui')" class="p-2 bg-emerald-50 text-emerald-600 hover:bg-emerald-100 rounded-lg transition-all" title="Setujui">
                                    <i data-lucide="check" class="w-4 h-4"></i>
                                </button>
                                <button onclick="handleVendorAction(${v.rowIndex}, 'Ditolak')" class="p-2 bg-red-50 text-red-600 hover:bg-red-100 rounded-lg transition-all" title="Tolak">
                                    <i data-lucide="x" class="w-4 h-4"></i>
                                </button>
                            ` : `
                                <button class="p-2 text-gray-300 cursor-not-allowed">
                                    <i data-lucide="lock" class="w-4 h-4"></i>
                                </button>
                            `}
                        </div>
                    </td>
                </tr>
            `;
        }).join('');
        lucide.createIcons();
    }

    function handleVendorAction(rowIndex, status) {
        const actionText = status === 'Disetujui' ? 'menyetujui' : 'menolak';
        const confirmColor = status === 'Disetujui' ? 'emerald' : 'red';

        showConfirm(`Apakah Anda yakin ingin ${actionText} pengajuan vendor ini?`, () => {
            if (loadingContainer) loadingContainer.classList.remove('hidden');
            google.script.run
                .withSuccessHandler((res) => {
                    if (loadingContainer) loadingContainer.classList.add('hidden');
                    if (res.success) {
                        DATA_VENDOR = res.data;
                        renderVendorTable();
                        notifySuccess(`Berhasil ${status === 'Disetujui' ? 'menyetujui' : 'menolak'} pengajuan vendor.`);
                    } else {
                        notifyError("Gagal update status: " + res.error);
                    }
                })
                .withFailureHandler(onFailure)
                .updateVendorStatus(rowIndex, status);
        });
    }

    function updateDashboardStats() {
        // Calculate totals
        const totalPelaksanaan = DATA_REAL.length;
        const totalCert = DATA_CERT.length;
        const totalLat = DATA_LAT.length;

        document.getElementById('dash-total-pelaksanaan').innerText = totalPelaksanaan.toLocaleString('id-ID');
        document.getElementById('dash-total-cert').innerText = totalCert.toLocaleString('id-ID');
        document.getElementById('dash-total-lat').innerText = totalLat.toLocaleString('id-ID');

        // Bottom small cards
        document.getElementById('dash-bot-cert').innerText = totalCert.toLocaleString('id-ID');
        document.getElementById('dash-bot-real').innerText = totalPelaksanaan.toLocaleString('id-ID');
        document.getElementById('dash-bot-lat').innerText = totalLat.toLocaleString('id-ID');

        // --- EVALUASI SUMMARY ---
        const l1Count = (DATA_L1 || []).length;
        const l2Count = (DATA_L2 || []).length;
        const l3Count = (DATA_L3 || []).length;
        const totalEval = l1Count + l2Count + l3Count;

        document.getElementById('dash-total-evaluasi').innerText = totalEval.toLocaleString('id-ID');
        document.getElementById('dash-l1-total').innerText = l1Count;
        document.getElementById('dash-l2-total').innerText = l2Count;
        document.getElementById('dash-l3-total').innerText = l3Count;
        document.getElementById('dash-bot-eval').innerText = totalEval.toLocaleString('id-ID');

        // Per-tahun breakdown
        const byYear = {};
        const addToYear = (arr, level) => {
            (arr || []).forEach(item => {
                const yr = String(item.tahun || item.pelaksanaanId || '').match(/20\d{2}/);
                const key = yr ? yr[0] : 'Lainnya';
                if (!byYear[key]) byYear[key] = { L1: 0, L2: 0, L3: 0 };
                byYear[key][level]++;
            });
        };
        addToYear(DATA_L1, 'L1');
        addToYear(DATA_L2, 'L2');
        addToYear(DATA_L3, 'L3');

        const container = document.getElementById('dash-evaluasi-year-breakdown');
        const years = Object.keys(byYear).sort();

        if (years.length === 0) {
            container.innerHTML = '<span class="italic text-gray-300 col-span-full text-center py-10">Belum ada data evaluasi</span>';
        } else {
            container.innerHTML = years.map(yr => {
                const d = byYear[yr];
                const total = (d.L1 || 0) + (d.L2 || 0) + (d.L3 || 0);

                // Max for bar height (normalized)
                const maxVal = Math.max(d.L1, d.L2, d.L3, 1);
                const h1 = (d.L1 / maxVal) * 80;
                const h2 = (d.L2 / maxVal) * 80;
                const h3 = (d.L3 / maxVal) * 80;

                return `<div class="bg-white border border-gray-50 rounded-[32px] p-8 shadow-sm hover:shadow-indigo-100/20 transition-all duration-300">
            <p class="text-center text-[11px] font-bold text-gray-300 mb-2 uppercase tracking-[0.2em]">${yr}</p>
            <p class="text-center text-4xl font-extrabold text-[#1E1B4B] mb-8 tracking-tighter">${total.toLocaleString('id-ID')}</p>
            
            <div class="space-y-3 mb-10">
              <div class="flex justify-between items-center text-[10px] font-bold">
                <span class="text-gray-300">L1</span>
                <span class="text-[#6366F1] font-extrabold">${(d.L1 || 0).toLocaleString('id-ID')}</span>
              </div>
              <div class="flex justify-between items-center text-[10px] font-bold">
                <span class="text-gray-300">L2</span>
                <span class="text-[#10B981] font-extrabold">${(d.L2 || 0).toLocaleString('id-ID')}</span>
              </div>
              <div class="flex justify-between items-center text-[10px] font-bold">
                <span class="text-gray-300">L3</span>
                <span class="text-[#F97316] font-extrabold">${(d.L3 || 0).toLocaleString('id-ID')}</span>
              </div>
            </div>

            <!-- Mini Bar Chart -->
            <div class="flex items-end justify-center gap-4 h-24 border-t border-gray-50 pt-4">
                <div class="w-4 bg-[#6366F1] rounded-t-md transition-all duration-500" style="height: ${h1}px" title="L1: ${d.L1}"></div>
                <div class="w-4 bg-[#10B981] rounded-t-md transition-all duration-500" style="height: ${h2}px" title="L2: ${d.L2}"></div>
                <div class="w-4 bg-[#F97316] rounded-t-md transition-all duration-500" style="height: ${h3}px" title="L3: ${d.L3}"></div>
            </div>
          </div>`;
            }).join('');
        }
        lucide.createIcons();
    }

    function openSubPage(pageId, pageTitle) {
        console.log(`OpenSubPage Called: ${pageId}, Title: ${pageTitle}`);

        // Hide all sections
        document.querySelectorAll('.content-section').forEach(el => {
            el.classList.add('hidden');
        });

        // Show target section
        const target = document.getElementById(pageId);
        if (target) {
            target.classList.remove('hidden');
        } else {
            console.error(`Target Page ID: ${pageId} not found!`);
        }

        // Update Global Title
        document.getElementById('page-title').innerText = pageTitle;

        // --- Update Sidebar Active State ---
        document.querySelectorAll('.nav-link').forEach(link => {
            // Reset to default
            link.classList.remove('bg-indigo-50/50', 'text-[#6366F1]', 'font-bold');
            link.classList.add('text-gray-500', 'font-medium');
            link.querySelector('.active-indicator')?.classList.add('hidden');

            // If this is the active link
            if (link.id === `nav-${pageId}`) {
                link.classList.remove('text-gray-500', 'font-medium');

        const filterFunc = (item) => item.periode && item.periode.toString().includes(year);

    function renderMonthCards() {
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];
        const monthData = {};

        // Count data per month
        [...FILTERED_CERT, ...FILTERED_LAT].forEach(item => {
            if (!item.periode) return;
            const p = item.periode.toString(); // Expected: YYYY-MM-DD

            // Handle YYYY-MM-DD format
            if (p.length >= 7 && p.charAt(4) === '-') {
                const mIndex = parseInt(p.substring(5, 7)); // '01' -> 1
                if (!isNaN(mIndex) && mIndex >= 1 && mIndex <= 12) {
                    const mName = monthNames[mIndex - 1]; // 0-based index
                    monthData[mName] = (monthData[mName] || 0) + 1;
                }
            } else { // Fallback for old/other format (e.g. "Jan 2024" )
                monthNames.forEach(month => {
                    if (p.includes(month)) {
                        monthData[month] = (monthData[month] || 0) + 1;
                    }
                });
            }
        });

        // Render month cards (HANYA yang ada datanya)
        const container = document.getElementById('months-grid');
        container.innerHTML = '';

        // Filter: hanya render bulan yang punya data
        monthNames.forEach(month => {
            const count = monthData[month] || 0;

            // Skip bulan yang kosong
            if (count === 0) return;

            const card = document.createElement('div');
            card.className = 'month-card active';
            card.onclick = () => openMonthDetail(month);
            card.innerHTML = `
    <h3>${month}</h3>
    <p>${count} Data</p>
    `;
            container.appendChild(card);
        });

        // Tampilkan message jika tidak ada data sama sekali
        if (container.children.length === 0) {
            container.innerHTML = '<div class="col-span-full py-12 text-center text-gray-400">Tidak ada data untuk tahun ini.</div>';
        }
    }

    function openMonthDetail(month) {
        ACTIVE_MONTH = month;

        // Hide month view, show list view
        document.getElementById('view-planning-months').classList.add('hidden');
        document.getElementById('view-planning-list').classList.remove('hidden');
        document.getElementById('selected-year-display').innerText = `Tahun ${ACTIVE_YEAR} - ${month}`;
        document.getElementById('emp-search-input').value = '';
        document.getElementById('emp-filter-status').value = '';

        // Month Name to Index Map for filtering
        const monthNames = ['Jan', 'Feb', 'Mar', 'Apr', 'Mei', 'Jun', 'Jul', 'Agu', 'Sep', 'Okt', 'Nov', 'Des'];

        // Filter by month AND year
        const filterFunc = (item) => {
            if (!item.periode) return false;
            const p = item.periode.toString();

            // Check Year
            if (!p.includes(ACTIVE_YEAR)) return false;

            // Check Month (Standard YYYY-MM-DD or Legacy)
            if (p.length >= 7 && p.charAt(4) === '-') {
                const mIndex = parseInt(p.substring(5, 7));
                if (!isNaN(mIndex)) {
                    return monthNames[mIndex - 1] === month;
                }
            }

            // Fallback
            return p.includes(month);
        };

        FILTERED_CERT = DATA_CERT.filter(filterFunc);
        FILTERED_LAT = DATA_LAT.filter(filterFunc);

        renderEmployeeList();
    }

    // --- HELPERS ---
    function toggleAccordion(uid) {
        const el = document.getElementById('content-' + uid);
        const parentRow = el ? el.closest('.bg-white.group') : null;
        const container = document.getElementById('realization-list-container');
        const arrow = parentRow ? parentRow.querySelector('[data-lucide="chevron-down"]') : null;

        if (!el || !container) return;

        const isOpening = el.classList.contains('hidden');

        // 1. Reset all other items
        document.querySelectorAll('#realization-list-container .accordion-content').forEach(content => {
            if (content.id !== 'content-' + uid) {
                content.classList.add('hidden');
                content.classList.remove('show');
                const otherParent = content.closest('.bg-white.group');
                if (otherParent) {
                    otherParent.classList.remove('active-focus');
                    const otherArrow = otherParent.querySelector('[data-lucide="chevron-down"]');
                    if (otherArrow) otherArrow.style.transform = 'rotate(0deg)';
                }
            }
        });

        if (isOpening) {
            // 2. Open current and apply focus
            el.classList.remove('hidden');
            el.classList.add('show');
            if (parentRow) parentRow.classList.add('active-focus');
            container.classList.add('focus-mode');
            if (arrow) arrow.style.transform = 'rotate(180deg)';
        } else {
            // 3. Close current and remove focus
            el.classList.add('hidden');
            el.classList.remove('show');
            if (parentRow) parentRow.classList.remove('active-focus');
            container.classList.remove('focus-mode');
            if (arrow) arrow.style.transform = 'rotate(0deg)';
        }
    }

    function saveData(event) {
        event.preventDefault();
        const btn = document.getElementById('btn-save');
        btn.innerText = 'Menyimpan...';
        btn.disabled = true;
        const editMode = document.getElementById('form-edit-mode').value;
        const formData = {
            id: document.getElementById('form-id').value,
            sap: document.getElementById('form-sap').value,
            nama: document.getElementById('form-nama').value,
            itemId: document.getElementById('form-itemId').value,
            judul: document.getElementById('form-judul').value,
            periode: document.getElementById('form-periode').value,
            mandatory: document.getElementById('form-mandatory').value,
            resiko: document.getElementById('form-resiko').value,
        };
        const type = document.getElementById('form-type').value;
        const handler = () => {
            notifySuccess(editMode === 'edit' ? 'Data berhasil diperbarui!' : 'Data berhasil ditambahkan!');
            closeModal();
            loadData();
            btn.disabled = false;
            btn.innerText = 'Simpan';
        };
        const failHandler = (err) => {
            notifyError('Error: ' + (err.message || err));
            btn.disabled = false;
            btn.innerText = 'Simpan';
        };
        if (type === 'cert') {
            formData.jumlah = document.getElementById('form-jumlah').value;
            formData.statusAnggaran = document.getElementById('form-status').value;
            if (editMode === 'edit') {
                google.script.run.withSuccessHandler(handler).withFailureHandler(failHandler).updateData(formData);
            } else {
                google.script.run.withSuccessHandler(handler).withFailureHandler(failHandler).addData(formData);
            }
        } else {
            formData.instruktur = document.getElementById('form-instruktur').value;
            if (editMode === 'edit') {
                google.script.run.withSuccessHandler(handler).withFailureHandler(failHandler).updateLATData(formData);
            } else {
                google.script.run.withSuccessHandler(handler).withFailureHandler(failHandler).addLATData(formData);
            }
        }
    }

            }

        // Count L3 data per year
        DATA_L3.forEach(item => {
            if (item.tahun) {
                yearCounts[item.tahun] = (yearCounts[item.tahun] || 0) + 1;
            }

    function saveEvaluasiL2(e) {
        e.preventDefault();
        const btn = document.getElementById('btn-save-l2');
        const originalText = btn.innerText;
        btn.disabled = true;
        btn.innerText = 'Menyimpan...';

        const mode = document.getElementById('l2-mode').value;
        const formData = {
            id: document.getElementById('l2-id').value,
            pelaksanaanId: document.getElementById('l2-pelaksanaanId').value,
            judulPelatihan: document.getElementById('l2-judul').value,
            sap: document.getElementById('l2-sap').value,
            namaPeserta: document.getElementById('l2-nama').value,
            preTest: document.getElementById('l2-preTest').value,
            postTest: document.getElementById('l2-postTest').value,
            ket: document.getElementById('l2-ket').value
        };

        const handler = function (response) {
            btn.disabled = false;
            btn.innerText = originalText;
            if (response.success) {
                alert('Data Evaluasi L2 berhasil disimpan!');
                DATA_L2 = response.data;
                enrichL2Data();
                renderL2List();
                closeEvaluasiL2Modal();
            } else {
                alert('Error: ' + response.error);
            }
        };

        if (mode === 'add') {
            google.script.run.withSuccessHandler(handler).withFailureHandler(handler).addEvaluasiL2(formData);
        } else {
            google.script.run.withSuccessHandler(handler).withFailureHandler(handler).updateEvaluasiL2(formData);
        }
    }

    function deleteEvaluasiL2(id) {
        if (!confirm('Hapus data evaluasi L2 ini?')) return;
        google.script.run.withSuccessHandler(function (response) {
            if (response.success) {
                alert('Data terhapus!');
                DATA_L2 = response.data;
                enrichL2Data();
                renderL2List();
            } else {
                alert('Gagal hapus: ' + response.error);
            }
        }).withFailureHandler(alert).deleteEvaluasiL2(id);
    }

    function _renderTabRekapKaryawan() {
        const query = document.getElementById('lap-search-karyawan').value.toLowerCase().trim();
        const infoDiv = document.getElementById('lap-rekap-info');
        const emptyDiv = document.getElementById('lap-rekap-empty');
        const tableContainer = document.getElementById('lap-rekap-table-container');
        const tbody = document.getElementById('lap-rekap-tbody');

        if (!query) {
            infoDiv.classList.add('hidden');
            tableContainer.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            return;
        }

        // Find matches in REAL (priority), then CERT, then LAT
        let matchedSap = "";
        let matchedName = "";

        // Check REAL first for exact or partial
        const allReal = DATA_REAL || [];
        for (let r of allReal) {
            if ((r.sapPeserta && String(r.sapPeserta).toLowerCase().includes(query)) ||
                (r.namaPeserta && String(r.namaPeserta).toLowerCase().includes(query))) {
                matchedSap = r.sapPeserta;
                matchedName = r.namaPeserta;
                break;
            }
        }

        // If not in REAL, check CERT/LAT
        if (!matchedSap) {
            const allPlan = [...(DATA_CERT || []), ...(DATA_LAT || [])];
            for (let p of allPlan) {
                if ((p.sap && String(p.sap).toLowerCase().includes(query)) ||
                    (p.nama && String(p.nama).toLowerCase().includes(query))) {
                    matchedSap = p.sap;
                    matchedName = p.nama;
                    break;
                }
            }
        }

        if (!matchedSap) {
            infoDiv.classList.add('hidden');
            tableContainer.classList.add('hidden');
            emptyDiv.classList.remove('hidden');
            emptyDiv.innerText = "Karyawan tidak ditemukan. Coba kata kunci lain.";
            return;
        }

        // Display Info
        infoDiv.classList.remove('hidden');
        document.getElementById('lap-rekap-nama').innerText = matchedName;
        document.getElementById('lap-rekap-sap').innerText = matchedSap;
        emptyDiv.classList.add('hidden');
        tableContainer.classList.remove('hidden');

        // Compile history
        const history = [];

        // Add Realization Data
        allReal.forEach(r => {
            if (String(r.sapPeserta) === String(matchedSap)) {
                // Find L2 & L3
                const l2Info = (DATA_L2 || []).find(x => String(x.pelaksanaanId) === String(r.id) && String(x.sap) === String(r.sapPeserta));
                const l3Info = (DATA_L3 || []).find(x => String(x.pelaksanaanId) === String(r.id) && String(x.sap) === String(r.sapPeserta));

                history.push({
                    type: 'Realisasi',
                    judul: r.courseTitle || '-',
                    waktu: r.tahun || r.startDate || '-',
                    l2: l2Info ? l2Info.postTest : '-',
                    l3: l3Info ? l3Info.nilaiEvaluasi : '-',
                    sortDate: r.startDate || '1970-01-01'
                });
            }
        });

        // Sub-sort and render
        history.sort((a, b) => new Date(b.sortDate) - new Date(a.sortDate));

        if (history.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500 italic">Belum ada riwayat pelaksanaan untuk karyawan ini.</td></tr>`;
            return;
        }

        tbody.innerHTML = history.map((h, i) => `
  <tr class="hover:bg-indigo-50 transition-colors">
    <td class="px-4 py-3 text-gray-500">${i + 1}</td>
    <td class="px-4 py-3 font-medium text-gray-900">${h.judul}</td>
    <td class="px-4 py-3 text-gray-600"><span class="px-2 py-1 bg-emerald-100 text-emerald-700 rounded text-xs font-bold">Pelaksanaan</span></td>
    <td class="px-4 py-3 text-gray-600">${h.waktu}</td>
    <td class="px-4 py-3 font-bold ${h.l2 !== '-' ? 'text-blue-600' : 'text-gray-400'}">${h.l2}</td>
    <td class="px-4 py-3 font-bold ${h.l3 !== '-' ? 'text-orange-600' : 'text-gray-400'}">${h.l3}</td>
  </tr>
`).join('');
        lucide.createIcons();
    }

    function _renderTabMatriksEvaluasi() {
        const yearFilter = document.getElementById('lap-matriks-year').value;
        const tbody = document.getElementById('lap-matriks-tbody');

        // Group Realization by Course Title
        const grouped = {};
        (DATA_REAL || []).forEach(r => {
            if (yearFilter !== 'ALL' && String(r.tahun) !== yearFilter) return;

            const title = r.judulPelatihan || r.courseTitle || r.judul || 'Unknown Training';
            if (!grouped[title]) {
                grouped[title] = { pelIds: new Set(), thn: new Set(), totalHadir: 0 };
            }
            grouped[title].pelIds.add(String(r.id));
            if (r.tahun) grouped[title].thn.add(r.tahun);
            grouped[title].totalHadir++;
        });

        // Helper to normalize IDs for robust comparison (handles '123' vs '123.0' vs ' 123 ')
        const normalizeId = (id) => {
            if (id === null || id === undefined) return '';
            let sid = String(id).trim();
            if (sid.endsWith('.0')) sid = sid.substring(0, sid.length - 2);
            return sid;
        };

        // Extract normalized IDs for each group
        Object.keys(grouped).forEach(title => {
            grouped[title].normIds = Array.from(grouped[title].pelIds).map(normalizeId);
        });

        // Calculate scores per group
        const matrixData = [];
        Object.keys(grouped).forEach(title => {
            const g = grouped[title];
            const normIds = g.normIds;

            // Calc L1
            let l1Sum = 0, l1Count = 0, l1Match = 0, textValL1 = "";
            (DATA_L1 || []).forEach(l1 => {
                const sid = normalizeId(l1.pelaksanaanId);
                const l1Title = (l1.judulPelatihan || '').trim().toLowerCase();
                const targetTitle = title.trim().toLowerCase();
                const nameMatch = l1Title && l1Title === targetTitle;

                if ((sid && normIds.includes(sid)) || nameMatch) {
                    l1Match++;
                    const strVal = String(l1.rataKeseluruhan || '').replace(',', '.').trim();
                    const val = parseFloat(strVal);
                    if (!isNaN(val)) {
                        l1Sum += val; l1Count++;
                    } else if (strVal !== '') {
                        textValL1 = strVal;
                    }
                }
            });

            // Calc L2
            let l2Sum = 0, l2Count = 0, l2Match = 0;
            (DATA_L2 || []).forEach(l2 => {
                const sid = normalizeId(l2.pelaksanaanId);
                const l2Title = (l2.judulPelatihan || '').trim().toLowerCase();
                const targetTitle = title.trim().toLowerCase();
                const nameMatch = l2Title && l2Title === targetTitle;

                if ((sid && normIds.includes(sid)) || nameMatch) {
                    l2Match++;
                    const pre = parseFloat(String(l2.preTest || '').replace(',', '.'));
                    const post = parseFloat(String(l2.postTest || '').replace(',', '.'));
                    if (!isNaN(pre) && !isNaN(post)) {
                        l2Sum += post;
                        l2Count++;
                    }
                }
            });

            // Calc L3
            let l3Sum = 0, l3Count = 0, l3Match = 0, textValL3 = "";
            (DATA_L3 || []).forEach(l3 => {
                const sid = normalizeId(l3.pelaksanaanId);
                const l3Title = (l3.judulPelatihan || '').trim().toLowerCase();
                const targetTitle = title.trim().toLowerCase();
                const nameMatch = l3Title && l3Title === targetTitle;

                if ((sid && normIds.includes(sid)) || nameMatch) {
                    l3Match++;
                    const strVal = String(l3.nilaiEvaluasi || '').replace(',', '.').trim();
                    const val = parseFloat(strVal);
                    if (!isNaN(val)) {
                        l3Sum += val; l3Count++;
                    } else if (strVal !== '') {
                        textValL3 = strVal;
                    }
                }
            });

            let l1Disp = "-", l2Disp = "-", l3Disp = "-";

            // L1 Display Logic
            if (l1Count > 0) l1Disp = (l1Sum / l1Count).toFixed(2);
            else if (l1Match > 0) l1Disp = textValL1 ? textValL1 : "0";
            else l1Disp = "-";

            // L2 Display Logic
            if (l2Count > 0) l2Disp = (l2Sum / l2Count).toFixed(2);
            else if (l2Match > 0) l2Disp = "Pre/Post Kurang";
            else l2Disp = "-";

            // L3 Display Logic
            if (l3Count > 0) l3Disp = (l3Sum / l3Count).toFixed(2);
            else if (l3Match > 0) l3Disp = textValL3 ? textValL3 : "0";
            else l3Disp = "-";

            matrixData.push({
                title: title,
                tahun: Array.from(g.thn).join(', '),
                l1: l1Disp,
                l2: l2Disp,
                l3: l3Disp
            });
        });

        // Render
        if (matrixData.length === 0) {
            tbody.innerHTML = `<tr><td colspan="6" class="px-4 py-8 text-center text-gray-500 italic">Data pelatihan pada tahun terpilih tidak tersedia.</td></tr>`;
            return;
        }

        matrixData.sort((a, b) => {
            const titleA = String(a.title || "");
            const titleB = String(b.title || "");
            return titleA.localeCompare(titleB);
        });

        tbody.innerHTML = matrixData.map((m, i) => `
  <tr class="hover:bg-indigo-50 transition-colors">
    <td class="px-4 py-3 text-gray-500 border-r border-gray-100">${i + 1}</td>
    <td class="px-4 py-3 font-semibold text-gray-800 border-r border-gray-100">${m.title}</td>
    <td class="px-4 py-3 text-gray-600 border-r border-gray-100">${m.tahun}</td>
    <td class="px-4 py-3 text-center font-bold ${m.l1 !== '-' ? 'text-purple-700' : 'text-gray-300'} border-r border-gray-100">${m.l1}</td>
    <td class="px-4 py-3 text-center font-bold ${m.l2 !== '-' ? 'text-blue-700' : 'text-gray-300'} border-r border-gray-100">${m.l2}</td>
    <td class="px-4 py-3 text-center font-bold ${m.l3 !== '-' ? 'text-orange-700' : 'text-gray-300'}">${m.l3}</td>
  </tr>
`).join('');
        lucide.createIcons();
    }

    function exportToExcel() {
        if (typeof XLSX === 'undefined') {
            alert('Library Export belum termuat (XLSX undefined). Harap segarkan halaman.');
            return;
        }

        const type = document.getElementById('lap-export-type').value;
        let dataToExport = [];
        let sheetName = "Data";
        let filename = "Data_" + type + ".xlsx";

        switch (type) {
            case 'realisasi': dataToExport = DATA_REAL; sheetName = "Pelaksanaan"; break;
            case 'cert': dataToExport = DATA_CERT; sheetName = "Perencanaan_Sertifikasi"; break;
            case 'lat': dataToExport = DATA_LAT; sheetName = "Perencanaan_LAT"; break;
            case 'l1': dataToExport = DATA_L1; sheetName = "Evaluasi_L1"; break;
            case 'l2': dataToExport = DATA_L2; sheetName = "Evaluasi_L2"; break;
            case 'l3': dataToExport = DATA_L3; sheetName = "Evaluasi_L3"; break;
            default: dataToExport = [];
        }

        if (!dataToExport || dataToExport.length === 0) {
            alert('Tidak ada data yang tersedia untuk diekspor pada kategori ini.');
            return;
        }

        try {
            const wb = XLSX.utils.book_new();
            const ws = XLSX.utils.json_to_sheet(dataToExport);
            XLSX.utils.book_append_sheet(wb, ws, sheetName);
            XLSX.writeFile(wb, filename);

            showCustomDialog({
                title: 'Ekspor Berhasil',
                message: 'Data sedang diunduh: ' + filename,
                icon: 'download',
                iconColor: 'emerald'
            });
        } catch (e) {
            console.error(e);
            showCustomDialog({
                title: 'Ekspor Gagal',
                message: 'Terjadi kesalahan: ' + e.message,
                icon: 'alert-circle',
                iconColor: 'red'
            });
        }
    }

    /* ─────────────────────────────────────────────────────────────────────────────
     * VENDOR PAGE LOGIC
     * ───────────────────────────────────────────────────────────────────────────── */
    function renderVendorTable() {
        const tbody = document.getElementById('vendor-table-body');
        const badge = document.getElementById('vendor-notification-badge');
        if (!tbody) return;

        const searchQuery = document.getElementById('vendor-search-input')?.value.toLowerCase() || "";
        const statusFilter = document.getElementById('vendor-filter-status')?.value || "";

        if (!DATA_VENDOR || DATA_VENDOR.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-10 text-center text-gray-500 italic">Belum ada data pengajuan vendor.</td></tr>`;
            if (badge) badge.classList.add('hidden');
            return;
        }

        // --- 1. UPDATE SIDEBAR BADGE ---
        const pendingCount = DATA_VENDOR.filter(v => v.status === "Pending").length;
        if (badge) {
            if (pendingCount > 0) {
                badge.innerText = pendingCount;
                badge.classList.remove('hidden');
            } else {
                badge.classList.add('hidden');
            }
        }

        // --- 2. GROUP & SORT DATA ---
        // We sort raw data first: Pending first, then by timestamp (newest first)
        const sortedData = [...DATA_VENDOR].sort((a, b) => {
            if (a.status === "Pending" && b.status !== "Pending") return -1;
            if (a.status !== "Pending" && b.status === "Pending") return 1;
            return (b.timestamp || 0) - (a.timestamp || 0);
        });

        const groups = {};
        const now = Date.now();
        const oneDayMs = 24 * 60 * 60 * 1000;

        sortedData.forEach(v => {
            const matchesSearch = (v.namaVendor + " " + v.namaSertifikasi).toLowerCase().includes(searchQuery);
            const matchesStatus = statusFilter === "" || v.status === statusFilter;

            if (matchesSearch && matchesStatus) {
                if (!groups[v.namaVendor]) {
                    groups[v.namaVendor] = {
                        name: v.namaVendor,
                        lsp: v.namaLsp,
                        pic: v.picVendor,
                        items: [],
                        hasNew: false,
                        hasPending: false
                    };
                }
                const isNew = (v.timestamp && (now - v.timestamp) < oneDayMs);
                if (isNew) groups[v.namaVendor].hasNew = true;
                if (v.status === "Pending") groups[v.namaVendor].hasPending = true;

                groups[v.namaVendor].items.push({ ...v, isNew });
            }
        });

        const vendorNames = Object.keys(groups);

        if (vendorNames.length === 0) {
            tbody.innerHTML = `<tr><td colspan="8" class="px-6 py-10 text-center text-gray-400 italic">Tidak ada data yang cocok.</td></tr>`;
            return;
        }

        tbody.innerHTML = vendorNames.map((name, i) => {
            const g = groups[name];
            const groupId = `vendor-group-${i}`;

            return `
            <tr onclick="toggleVendorAccordion('${groupId}')" class="cursor-pointer bg-white hover:bg-indigo-50 transition-all border-b border-gray-100 group">
                <td class="px-6 py-5 text-sm text-gray-500 font-mono">${i + 1}</td>
                <td class="px-6 py-5">
                    <div class="flex items-center gap-3">
                        <div class="w-10 h-10 bg-indigo-50 text-indigo-600 rounded-2xl flex items-center justify-center font-bold text-sm shadow-sm border border-indigo-100 group-hover:bg-indigo-600 group-hover:text-white transition-all">
                            ${name.charAt(0)}
                        </div>
                        <div>
                            <div class="flex items-center gap-2">
                                <div class="text-sm font-bold text-gray-900">${name}</div>
                                ${g.hasNew ? '<span class="px-1.5 py-0.5 bg-emerald-500 text-white text-[8px] font-black rounded-md animate-pulse">BARU</span>' : ''}
                            </div>
                            <div class="text-[10px] text-gray-400 uppercase tracking-tight">${g.lsp || '-'}</div>
                        </div>
                    </div>
                </td>
                <td class="px-6 py-5 text-center">
                    <span class="inline-flex items-center px-3 py-1 ${g.hasPending ? 'bg-amber-50 text-amber-700 border-amber-100' : 'bg-indigo-50 text-indigo-700 border-indigo-100'} rounded-xl text-[10px] font-bold border">
                        ${g.items.length} Ajuan
                    </span>
                </td>
                <td class="px-6 py-5">
                    <div class="text-sm text-gray-700 font-medium">${g.pic}</div>
                </td>
                <td colspan="4" class="px-6 py-5 text-right">
                    <div class="flex justify-end items-center gap-4">
                        <div class="text-[10px] text-gray-400 font-medium uppercase tracking-widest opacity-0 group-hover:opacity-100 transition-opacity">Klik untuk detail</div>
                        <i data-lucide="chevron-down" id="arrow-${groupId}" class="w-5 h-5 text-gray-300 transition-transform"></i>
                    </div>
                </td>
            </tr>
            <tr id="${groupId}" class="hidden bg-gray-50/30">
                <td colspan="8" class="p-0">
                    <div class="p-4 bg-gray-50/50 border-b border-gray-200">
                        <table class="w-full text-left bg-white rounded-2xl border border-gray-200 shadow-sm overflow-hidden">
                            <thead class="bg-gray-100/50">
                                <tr>
                                    <th class="px-4 py-3 text-[10px] font-bold text-gray-400 uppercase">Sertifikasi</th>
                                    <th class="px-4 py-3 text-[10px] font-bold text-gray-400 uppercase">Biaya</th>
                                    <th class="px-4 py-3 text-[10px] font-bold text-gray-400 uppercase">Metode</th>
                                    <th class="px-4 py-3 text-[10px] font-bold text-gray-400 uppercase">Status</th>
                                    <th class="px-4 py-3 text-[10px] font-bold text-gray-400 uppercase text-center">Aksi</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y divide-gray-100">
                                ${g.items.map(v => {
                let statusClass = "bg-gray-100 text-gray-600";
                if (v.status === "Disetujui") statusClass = "bg-emerald-100 text-emerald-700";
                if (v.status === "Ditolak") statusClass = "bg-red-100 text-red-700";
                if (v.status === "Pending") statusClass = "bg-indigo-100 text-indigo-700 font-bold animate-pulse";

                return `
                                    <tr>
                                        <td class="px-4 py-3">
                                            <div class="flex items-center gap-2">
                                                <div class="text-xs font-bold text-gray-800">${v.namaSertifikasi}</div>
                                                ${v.isNew ? '<span class="px-1 py-0.5 bg-emerald-100 text-emerald-600 text-[7px] font-bold rounded">NEW</span>' : ''}
                                            </div>
                                            <div class="text-[9px] text-gray-500 uppercase">${v.jenisSertifikasi || '-'}</div>
                                        </td>
                                        <td class="px-4 py-3 text-xs font-mono font-bold">${v.biaya}</td>
                                        <td class="px-4 py-3 text-xs text-gray-600">${v.metode}</td>
                                        <td class="px-4 py-3">
                                            <span class="px-2 py-0.5 rounded-full text-[9px] uppercase font-bold ${statusClass}">
                                                ${v.status || 'Pending'}
                                            </span>
                                        </td>
                                        <td class="px-4 py-3">
                                            <div class="flex justify-center gap-2">
                                                ${(() => {
                        if (!v.file || v.file === '-' || v.file.trim() === '') return '';
                        let url = v.file.trim();
                        if (!url.startsWith('http')) url = 'https://' + url;
                        return `<a href="${url}" target="_blank" class="w-7 h-7 flex items-center justify-center bg-blue-50 text-blue-600 rounded-full hover:bg-blue-600 hover:text-white transition-all shadow-sm border border-blue-100" title="Lihat Brosur"><i data-lucide="eye" class="w-4 h-4"></i></a>`;
                    })()}
                                                ${v.status === 'Pending' ? `
                                                    <button onclick="updateVendorStatusAction(${v.rowIndex}, 'Disetujui')" 
                                                        class="w-7 h-7 flex items-center justify-center bg-emerald-50 text-emerald-600 rounded-full hover:bg-emerald-600 hover:text-white transition-all shadow-sm border border-emerald-100" title="Setujui">
                                                        <i data-lucide="check" class="w-4 h-4"></i>
                                                    </button>
                                                    <button onclick="updateVendorStatusAction(${v.rowIndex}, 'Ditolak')" 
                                                        class="w-7 h-7 flex items-center justify-center bg-red-50 text-red-600 rounded-full hover:bg-red-600 hover:text-white transition-all shadow-sm border border-red-100" title="Tolak">
                                                        <i data-lucide="x" class="w-4 h-4"></i>
                                                    </button>
                                                ` : `<div class="flex items-center gap-1 text-[9px] text-gray-400 italic font-medium"><i data-lucide="lock" class="w-3 h-3"></i> Selesai</div>`}
                                            </div>
                                        </td>
                                    </tr>`;
            }).join('')}
                            </tbody>
                        </table>
                    </div>
                </td>
            </tr>
            `;
        }).join('');
        lucide.createIcons();
    }

    function toggleVendorAccordion(id) {
        const el = document.getElementById(id);
        const parentRow = el ? el.previousElementSibling : null;
        const arrow = document.getElementById('arrow-' + id);
        const tbody = document.getElementById('vendor-table-body');

        if (!el || !parentRow || !tbody) return;

        const isOpening = el.classList.contains('hidden');

        // 1. Reset all rows and hide all other details
        document.querySelectorAll('#vendor-table-body tr').forEach(tr => {
            tr.classList.remove('active-focus');
            // If it's a detail row (has an ID) and not the one we are toggling
            if (tr.id && tr.id.startsWith('vendor-group-') && tr.id !== id) {
                tr.classList.add('hidden');
                const otherArrow = document.getElementById('arrow-' + tr.id);
                if (otherArrow) otherArrow.style.transform = 'rotate(0deg)';
            }
        });

        if (isOpening) {
            // 2. Open current and apply focus
            el.classList.remove('hidden');
            parentRow.classList.add('active-focus');
            el.classList.add('active-focus');
            tbody.classList.add('focus-mode');
            if (arrow) arrow.style.transform = 'rotate(180deg)';
        } else {
            // 3. Close current and remove focus
            el.classList.add('hidden');
            tbody.classList.remove('focus-mode');
            if (arrow) arrow.style.transform = 'rotate(0deg)';
        }
    }
    function updateVendorStatusAction(rowIndex, status) {
        if (!confirm(`Yakin ingin ${status.toUpperCase()} pengajuan ini?`)) return;
        google.script.run.withSuccessHandler(function (response) {
            if (response.success) {
                DATA_VENDOR = response.data;
                renderVendorTable();
                notifySuccess(`Berhasil: ${status}`);
            } else {
                notifyError("Gagal: " + response.error);
            }
        }).updateVendorStatus(rowIndex, status);
    }
</script>

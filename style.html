<style>
    @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');

    /* Smooth Theme Transition */
    body {
        transition-property: background-color, color;
        transition-duration: 400ms;
        transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* Professional Loading Overlay */
    #loading-container {
        position: fixed;
        inset: 0;
        z-index: 9999;
        background: rgba(255, 255, 255, 0.95);
        backdrop-filter: blur(15px);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
        opacity: 1;
        visibility: visible;
    }

    #loading-container.hidden {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
    }

    .dark #loading-container {
        background: rgba(15, 23, 42, 0.8);
    }

    .loading-pulse {
        animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
    }

    @keyframes pulse {

        0%,
        100% {
            opacity: 1;
            transform: scale(1);
        }

        50% {
            opacity: .7;
            transform: scale(0.98);
        }
    }

    .loader-ring {
        width: 64px;
        height: 64px;
        border: 4px solid #E5E7EB;
        border-top: 4px solid #6366F1;
        border-radius: 50%;
        animation: spin 1s linear infinite;
        box-shadow: 0 0 15px rgba(99, 102, 241, 0.15);
    }

    .loading-title {
        color: #1E1B4B !important;
        font-size: 1.25rem;
        font-weight: 700;
    }

    .dark .loading-title {
        color: #FFFFFF !important;
    }

    .loading-subtitle {
        color: #64748B !important;
        font-size: 0.75rem;
        font-weight: 500;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        margin-top: 0.5rem;
        transition: opacity 0.5s;
    }

    .dark .loading-subtitle {
        color: #94A3B8 !important;
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(360deg);
        }
    }

    /* Premium Year Cards */
    .year-card-premium {
        background-color: rgba(255, 255, 255, 0.8);
        background-image: linear-gradient(135deg, rgba(255, 255, 255, 0.4), rgba(255, 255, 255, 0.1));
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.3);
        box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        border-radius: 24px;
        padding: 2rem;
    }

    .year-card-premium::before {
        content: '';
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        height: 5px;
        background: linear-gradient(90deg, #6366F1, #10B981);
        opacity: 0;
        transition: opacity 0.3s;
    }

    .year-card-premium:hover {
        transform: translateY(-8px) scale(1.02);
        background-color: rgba(255, 255, 255, 0.95);
        box-shadow: 0 25px 30px -10px rgba(0, 0, 0, 0.1), 0 15px 15px -10px rgba(0, 0, 0, 0.04);
        border-color: rgba(99, 102, 241, 0.4);
    }

    .year-card-premium:hover::before {
        opacity: 1;
    }

    .dark .year-card-premium {
        background-color: rgba(30, 41, 59, 0.6);
        background-image: linear-gradient(135deg, rgba(30, 41, 59, 0.2), rgba(15, 23, 42, 0.1));
        border-color: rgba(255, 255, 255, 0.1);
    }

    .dark .year-card-premium:hover {
        background-color: rgba(30, 41, 59, 0.9);
        border-color: rgba(99, 102, 241, 0.5);
    }

    /* Year Card Typography & Components */
    .year-card-title {
        color: #1E1B4B !important;
        transition: color 0.3s;
    }

    .dark .year-card-title {
        color: #FFFFFF !important;
    }

    .year-card-subtitle {
        color: #94A3B8 !important;
    }

    .year-card-badge {
        background: rgba(16, 185, 129, 0.1) !important;
        border: 1px solid rgba(16, 185, 129, 0.2) !important;
        color: #059669 !important;
    }

    .dark .year-card-badge {
        background: rgba(16, 185, 129, 0.2) !important;
        border-color: rgba(16, 185, 129, 0.3) !important;
        color: #34D399 !important;
    }

    .year-card-link {
        color: #6366F1 !important;
    }

    .dark .year-card-link {
        color: #818CF8 !important;
    }

    body {
        background-color: #F9FAFB;
        font-family: 'Plus Jakarta Sans', sans-serif;
        color: #1E1B4B;
    }

    .content-section {
        display: none;
    }

    .content-section:not(.hidden) {
        display: block;
    }

    .accordion-content {
        display: none;
    }

    .accordion-content.show {
        display: block;
        animation: slideDown 0.3s ease-out;
    }

    @keyframes slideDown {
        from {
            opacity: 0;
            transform: translateY(-5px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    /* Custom Scrollbar */
    ::-webkit-scrollbar {
        width: 6px;
        height: 6px;
    }

    ::-webkit-scrollbar-track {
        background: transparent;
    }

    ::-webkit-scrollbar-thumb {
        background: #E5E7EB;
        border-radius: 10px;
    }

    ::-webkit-scrollbar-thumb:hover {
        background: #D1D5DB;
    }

    .modal-scroll::-webkit-scrollbar {
        width: 8px;
    }

    th {
        white-space: nowrap;
    }

    /* Month Cards Styling */
    .month-card {
        background: white;
        border: 1px solid #F3F4F6;
        border-radius: 24px;
        padding: 24px;
        text-align: center;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        min-height: 120px;
        box-shadow: 0 1px 2px rgba(0, 0, 0, 0.02);
    }

    .month-card.active:hover {
        border-color: #6366F1;
        background: white;
        transform: translateY(-4px);
        box-shadow: 0 12px 24px -8px rgba(99, 102, 241, 0.15);
    }

    .month-card.disabled {
        opacity: 0.4;
        cursor: not-allowed;
        background: #f9fafb;
    }

    .month-card h3 {
        font-size: 16px;
        font-weight: 700;
        color: #1E1B4B;
        margin-bottom: 4px;
    }

    .month-card p {
        font-size: 11px;
        font-weight: 600;
        color: #6366F1;
    }

    /* Custom Dialog Styling */
    .custom-dialog-overlay {
        position: fixed;
        inset: 0;
        background: rgba(15, 23, 42, 0.4);
        backdrop-filter: blur(8px);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 9999;
        opacity: 0;
        visibility: hidden;
        transition: all 0.3s ease;
    }

    .custom-dialog-overlay.show {
        opacity: 1;
        visibility: visible;
    }

    .custom-dialog-card {
        background: white;
        border-radius: 32px;
        width: 90%;
        max-width: 440px;
        padding: 40px;
        box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.1);
        transform: scale(0.95);
        transition: all 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
        text-align: center;
    }

    .custom-dialog-overlay.show .custom-dialog-card {
        transform: scale(1);
    }

    .dialog-icon-wrapper {
        width: 80px;
        height: 80px;
        border-radius: 24px;
        display: flex;
        align-items: center;
        justify-content: center;
        margin: 0 auto 32px;
    }

    .hidden-force {
        display: none !important;
    }

    /* Lucide Global Override */
    svg {
        stroke-width: 2.2px;
    }

    /* Nav Transitions */
    .nav-link {
        transition: all 0.2s ease-in-out;
    }

    .dark .border-gray-200,

    .dark .shadow-sm {
        box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.5) !important;
    }

    .dark .nav-link {
        color: #94A3B8;
    }

    .dark .nav-link:hover {

    .dark .hover\:bg-emerald-50:hover,

    .dark .hover\:bg-emerald-50\/50:hover,
    .dark .hover\:bg-red-50:hover,
    .dark .hover\:bg-gray-50:hover,
    .dark .hover\:bg-gray-50\/50:hover,
    .dark tr:hover,
    .dark .month-card.active:hover {

        border-color: #475569 !important;
    }

    .dark .border-emerald-200,
    .dark .border-indigo-200,
    .dark .border-blue-200 {

    }

    .dark .month-card {

    }

    .dark .month-card h3 {

    }

    .dark .custom-dialog-card {

    }

    .dark .bg-red-100 {

    }

    .dark .text-red-700 {
